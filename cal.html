<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phone Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #dcdcdc;
      }

      .calculator {
        width: 320px;
        background: #f4f4f7;
        padding: 20px;
        border-radius: 25px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      #display {
        width: 100%;
        height: 90px;
        border: none;
        outline: none;
        background: transparent;
        font-size: 35px;
        text-align: right;
        color: #3d5f99;
        margin-bottom: 20px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      button {
        width: 60px;
        height: 60px;
        border: none;
        border-radius: 50%;
        font-size: 26px;
        cursor: pointer;
        background: #eef1f5;
        color: #3d5f99;
      }

      .operator {
        color: #d14b7d;
      }

      .equal {
        background: #d14b7d;
        color: white;
      }

      button:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="display" readonly />

      <div class="buttons">
        <button class="operator" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="backspace()">⌫</button>
        <button onclick="addPercent()">%</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendOperator('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendOperator('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendOperator('+')">+</button>

        <button onclick="appendBracket()">( )</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendDot()">.</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>

    <script>
      let display = document.getElementById("display");

      function appendValue(value) {
        display.value += value;
      }

      function appendOperator(op) {
        let value = display.value;

        if (value === "" && op !== "-") return;

        let lastChar = value.slice(-1);

        let operators = ["+", "-", "*", "/"];

        if (operators.includes(lastChar)) {
          display.value = value.slice(0, -1) + op;
        } else {
          display.value += op;
        }
      }

      function appendDot() {
        let value = display.value;

        let parts = value.split(/[\+\-\*\/]/);
        let lastPart = parts[parts.length - 1];

        if (!lastPart.includes(".")) {
          display.value += ".";
        }
      }

      function appendBracket() {
        let value = display.value;

        let open = (value.match(/\(/g) || []).length;
        let close = (value.match(/\)/g) || []).length;

        let lastChar = value.slice(-1);

        if (value === "" || "+-*/(".includes(lastChar)) {
          display.value += "(";
        } else if (open > close) {
          display.value += ")";
        } else {
          display.value += "(";
        }
      }

      function addPercent() {
        let value = display.value;

        if (value === "") return;

        let match = value.match(/(\d+\.?\d*)$/);

        if (match) {
          let num = match[0];
          let percent = parseFloat(num) / 100;

          display.value = value.slice(0, value.length - num.length) + percent;
        }
      }

      function calculate() {
        try {
          let expression = display.value;

          if (expression === "") return;

          if (expression.includes("/0")) {
            display.value = "can't divided by zero";
            return;
          }

          let result = eval(expression);

          if (result === Infinity) {
            display.value = "can't divided by zero";
          } else {
            display.value = result;
          }
        } catch {
          display.value = "Error";
        }
      }

      function clearDisplay() {
        display.value = "";
      }

      function backspace() {
        display.value = display.value.slice(0, -1);
      }
    </script>
  </body>
</html>
