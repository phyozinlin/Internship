<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Box Model</title>
    <style>
        .box {
            border: 3px solid black;
            width: 400px;
            background-color: yellow;
            height: 200px;
            margin: auto;
            display: flex;
            justify-content: center;
            border-radius: 5px;

        }


        h1 {
            text-align: center;
            align-items: center;
            border: 3px solid black;
            width: 300px;
            background-color: rgb(174, 201, 212);
            height: 100px;
            margin: auto;
            display: flex;
            justify-content: center;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Card Content</h1>
    </div>

</body>

</html>
