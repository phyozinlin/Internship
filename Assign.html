<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Utility Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f3f6;
            padding: 30px;
        }

        .container {
            width: 900px;
            margin: auto;
        }

        h1 {
            color: #1e293b;
        }

        .subtitle {
            margin-bottom: 25px;
            color: gray;
            font-size: 14px;
        }

        .navbar {
            background: #17233c;
            color: white;
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .features {
            display: flex;
            gap: 20px;
            margin: 25px 0;
        }

        .feature-box {
            flex: 1;
            background: #dbe7f6;
            padding: 25px;
            text-align: center;
            border-radius: 5px;
        }

        .main {
            display: flex;
            gap: 25px;
        }

        .controls,
        .preview {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .preview {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls h3 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .card {
            background: #093dac;
            color: white;
            padding: 30px;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .buttons {
            margin-top: 25px;
        }

        button {
            background: #065433;
            color: white;
            border: none;
            padding: 12px 18px;
            margin-right: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">

        <h1>CSS Utility Simulator</h1>
        <p class="subtitle">
            Change the inputs below to see how atomic classes combine to build UIs.
        </p>

        <nav class="navbar">
            <h2>MyLogo</h2>

            <div class="menu">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
        </nav>

        <div class="features">
            <div class="feature-box">Feature 1</div>
            <div class="feature-box">Feature 2</div>
            <div class="feature-box">Feature 3</div>
        </div>

        <div class="main">
            <div class="controls">
                <h3>Utility Controls</h3>

                <label>Padding (Spacing)</label>
                <select>
                    <option>Medium (p-8)</option>
                </select>

                <label>Background Theme (Colors)</label>
                <select>
                    <option>Primary Blue</option>
                </select>

                <label>Text Size (Typography)</label>
                <select>
                    <option>Large (text-xl)</option>
                </select>

                <label>Corner Radius (Borders)</label>
                <select>
                    <option>Square (rounded-none)</option>
                </select>

                <label>Shadow (Depth)</label>
                <select>
                    <option>Medium (shadow-md)</option>
                </select>
            </div>

            <div class="preview">
                <div class="card">
                    <h2>Alex Walker</h2>
                    <p>
                        Full-Stack Web Developer building
                        awesome things with Tailwind CSS.
                    </p>
                </div>
            </div>
        </div>

        <div class="buttons">
            <button>Submit</button>
            <button>Hover Me Slowly!</button>
        </div>
    </div>
    <script>
        const score=10;
        console.log(score);
        score=70;
        console.log(score);
    </script>
</body>
</html>
